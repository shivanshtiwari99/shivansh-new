<div class="order-details-wrapper py-4">

<div class="container">

<h4 class="page-title mb-4">Order Details</h4>

<div class="order-info mb-4">

<div class="row align-items-center">

<div class="col-md-4">
<strong>Order ID:</strong> {{orderId}}
</div>

<div class="col-md-4 text-center">

<span
class="status-badge"
[ngClass]="{
  'status-placed': items[0]?.status === 'Placed',
  'status-confirmed': items[0]?.status === 'Confirmed',
  'status-shipped': items[0]?.status === 'Shipped',
  'status-delivered': items[0]?.status === 'Delivered',
  'status-cancelled': items[0]?.status === 'Cancelled'
}">
{{items[0]?.status}}
</span>
</div>

<div class="col-md-4 text-md-end">
<strong>Delivery:</strong> 3-5 days
</div>

</div>

</div>

<div class="products-wrapper">

<div class="product-card"
*ngFor="let item of items">

<div class="product-row">

<img class="product-img"
[src]="'https://localhost:7071'+item.p_picture">

<div class="product-info">

<div class="product-name">
{{item.p_name}}
</div>

<div class="product-meta">
Price: ₹{{item.price}} | Qty: {{item.quantity}}
</div>

</div>

<div class="product-total">
₹{{item.price * item.quantity}}
</div>

</div>

</div>

</div>

</div>

</div>
