<div class="d-flex justify-content-center align-items-start" style="min-height: 80vh; padding-top:50px;">
  <div class="card shadow-lg rounded-4 overflow-hidden" style="width: 350px;">

    <!-- Top Banner -->
    <div class="banner-top">
      <img src="assets/photos/sh.jpg" alt="Profile Avatar" class="profile-avatar">
    </div>

    <!-- Card Body -->
    <div class="card-body mt-5 text-center">
      <!-- <input type="number"  value="{{user.u_id}}"> -->
      <!-- <h3 class="fw-bold mb-1">{{ user.u_id || 'Loading...' }}</h3> -->
      <h3 class="fw-bold mb-1">{{ user.name || 'Loading...' }}</h3>
      <p class="text-muted mb-3">{{ user.email || 'Loading...' }}</p>

      <div class="text-start mt-3">
        <p><strong>Mobile:</strong> {{ user.mobile || 'Loading...' }}</p>
        <p><strong>Date of Birth:</strong> {{ user.dob | date:'dd-MM-yyyy' }}</p>
        <p><strong>Gender:</strong> {{ user.gender || 'Loading...' }}</p>
      </div>

      <div class="text-center mt-3">
        <button class="btn btn-primary px-4" (click)="toggleModal()">
          Edit Profile
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Edit Profile Modal -->
<div class="modal" tabindex="-1" [ngClass]="{'show d-block': modalOpen}" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">

      <!-- Header -->
      <div class="modal-header">
        <h5 class="modal-title">Edit Profile</h5>
        <button type="button" class="btn-close" (click)="toggleModal()"></button>
      </div>

      <!-- Body -->
      <div class="modal-body">
        <form #profileForm="ngForm" (ngSubmit)="updateProfile()">

          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" [(ngModel)]="editUser.name" name="name" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" [(ngModel)]="editUser.email" name="email" class="form-control" readonly>
          </div>

          <div class="mb-3">
            <label class="form-label">Mobile</label>
            <input type="text" [(ngModel)]="editUser.mobile" name="mobile" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Date of Birth</label>
            <input type="date" [(ngModel)]="editUser.dob" name="dob" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Gender</label>
            <select [(ngModel)]="editUser.gender" name="gender" class="form-control">
              <option value="">Select Gender</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" (click)="toggleModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
