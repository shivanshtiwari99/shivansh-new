<div class="cart-page">

<div class="container">

<h3 class="cart-title">Shopping Cart</h3>

<div *ngIf="cartItems.length==0" class="empty-cart">

<h4>Your cart is empty</h4>
<p>Add some products to start shopping</p>

</div>

<div class="cart-grid" *ngIf="cartItems.length>0">

<div class="cart-items">

<div class="cart-card" *ngFor="let item of cartItems">

<div class="cart-img">

<img [src]="'https://localhost:7071'+item.p_picture" alt="{{item.p_name}}">

</div>

<div class="cart-info">

<h5>{{item.p_name}}</h5>

<p class="price">₹{{item.p_price}}</p>

<div class="qty-box">

<button (click)="decrease(item)">-</button>

<span>{{item.quantity}}</span>

<button (click)="increase(item)">+</button>

</div>

</div>

<div class="cart-total">

<p>₹{{getItemTotal(item)}}</p>

<button class="remove-btn" (click)="remove(item.cartitem_id)">
Remove
</button>

</div>

</div>

</div>

<div class="summary">

<h4>Order Summary</h4>

<div class="row">

<span>Subtotal</span>

<span>₹{{getTotal()}}</span>

</div>

<div class="row">

<span>Delivery</span>

<span class="free">Free</span>

</div>

<hr>

<div class="row total">

<span>Total</span>

<span>₹{{getTotal()}}</span>

</div>

<button class="checkout">
Proceed to Checkout
</button>

</div>

</div>

</div>

</div>
