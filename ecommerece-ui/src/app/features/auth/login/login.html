<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-header text-center">
        <h2>Login</h2>
      </div>

      <div class="card-body">
        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input 
              type="email" 
              class="form-control" 
              formControlName="email"
              placeholder="Enter email">

            <div class="text-danger" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
              <small *ngIf="loginForm.get('email')?.errors?.['required']">
                Email is required
              </small>
              <small *ngIf="loginForm.get('email')?.errors?.['email']">
                Invalid email format
              </small>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input 
              type="password" 
              class="form-control"
              formControlName="password"
              placeholder="Enter password">

            <div class="text-danger" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
              <small *ngIf="loginForm.get('password')?.errors?.['required']">
                Password is required
              </small>
              <small *ngIf="loginForm.get('password')?.errors?.['minlength']">
                Minimum 6 characters required
              </small>
            </div>
            <div class="text-end"><a routerLink="/register">Register Now</a></div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Login
          </button>

        </form>
      </div>
    </div>
  </div>
</div>
