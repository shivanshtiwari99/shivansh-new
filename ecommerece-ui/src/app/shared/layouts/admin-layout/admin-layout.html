
<div id="loader" [class.active]="loading">
    <div class="loader-box">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>
</div>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-top">
        <img src="assets/photos/1.png" alt="Logo" />
    </div>

    <div class="sidebar-links">
        <a routerLink="/admin-dashboard"><i class="fa-solid fa-gauge"></i> Dashboard</a>
        <a routerLink="/category"><i class="fa-solid fa-tags"></i> Categories</a>
        <a routerLink="/product"><i class="fa-solid fa-box"></i> Products</a>
        <a routerLink="/user"><i class="fa-solid fa-warehouse"></i> Users</a>
        <a routerLink="/orders"><i class="fa-solid fa-cart-shopping"></i> Orders</a>
        <a routerLink="/admin/settings"><i class="fa-solid fa-gear"></i> Settings</a>
        <a (click)="logout()" routerLink="/login"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>
</div>

<main>
    <router-outlet></router-outlet>
</main>
