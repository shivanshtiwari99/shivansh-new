<!-- Loader -->
<div id="loader" [class.active]="loading">
  <div class="loader-box">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-top">
    <img src="assets/photos/1.png" alt="Logo" />
  </div>

  <div class="sidebar-links">
    <a routerLink="/userCategory"><i class="fa-solid fa-tags"></i> Categories</a>
    <a routerLink="/userProduct"><i class="fa-solid fa-box"></i> Products</a>
    <a routerLink="/profile"><i class="fa-solid fa-warehouse"></i> Profile</a>
    <a routerLink="/user/cart"><i class="fa-solid fa-cart-shopping"></i> My Cart</a>
    <a routerLink="/user/settings"><i class="fa-solid fa-gear"></i> Settings</a>
    <a (click)="logout()" routerLink="/login"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
  </div>
</div>

<!-- Main Content -->
<main>
  <router-outlet></router-outlet>
</main>
