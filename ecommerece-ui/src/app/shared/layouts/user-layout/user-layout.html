<button class="menu-btn" (click)="toggleSidebar()">
  <i class="fa-solid fa-bars"></i>
</button>
<!-- Loader -->
<div id="loader" [class.active]="loading">
  <div class="loader-box">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
</div>
<!-- Mobile Menu Button -->


<!-- Overlay -->
<div class="sidebar-overlay" 
     [class.active]="sidebarOpen"
     (click)="toggleSidebar()"></div>

<!-- Sidebar -->
<div class="sidebar" [class.open]="sidebarOpen">
  <div class="sidebar-top">
    <img src="assets/photos/1.png" alt="Logo" />
  </div>

  <div class="sidebar-links">
    <a routerLink="/userCategory"><i class="fa-solid fa-tags"></i> Categories</a>
    <a routerLink="/userProduct"><i class="fa-solid fa-box"></i> Products</a>
    <a routerLink="/profile"><i class="fa-solid fa-warehouse"></i> Profile</a>
    
    <a routerLink="/cart">
  <i class="fa-solid fa-cart-shopping"></i>My Cart
  <span class="cart-badge">{{cartCount}}</span>
</a>
    <a routerLink="/myorder"><i class="fa-solid fa-truck"></i> My Orders</a>
    <a routerLink="/user/settings"><i class="fa-solid fa-gear"></i> Settings</a>
    <a (click)="logout()" routerLink="/login"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
  </div>
</div>

<!-- Main Content -->
<main>
  <router-outlet></router-outlet>
</main>
